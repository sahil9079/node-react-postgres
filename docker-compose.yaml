version: '3.8'

services:

   db:
      image: postgres:15-alpine
      restart: always
      ports:
         - "5432:5432"
      environment:
         POSTGRES_PASSWORD: mypassword
         POSTGRES_USER: postgres
         POSTGRES_DB: sampledb
      volumes:
         - dbdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d sampledb"]
        interval: 10s
        timeout: 5s
        retries: 5

   apiserver:
      build: ./apiserver
      image: sahil9079/js-apiserver:latest
      env_file: ./apiserver/.config.env
      ports:
         - "8010:8010"
      depends_on:
         db:
            condition: service_healthy

   client:
      build: ./client
      image: sahil9079/js-client:latest
      ports:
         - "80:80"

volumes:
   dbdata: {}